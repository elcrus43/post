services:
  - type: web
    name: autopost-app
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: VK_TOKEN
        sync: false
      - key: TG_BOT_TOKEN
        sync: false
